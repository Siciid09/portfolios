<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiigsi Tech - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Premium custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">User Management</h1>
                <p class="text-slate-500 text-sm mt-1">Manage subscriptions, track users, and update billing statuses.</p>
            </div>
            <div class="bg-green-100 text-green-700 px-4 py-2 rounded-lg text-sm font-semibold border border-green-200">
                🟢 Firebase Ready
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-slate-500">Total Users</p>
                    <p class="text-3xl font-bold text-slate-900" id="totalUsersCount">0</p>
                </div>
                <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xl">
                    <i class="fas fa-users"></i>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-slate-500">Paid Users</p>
                    <p class="text-3xl font-bold text-green-600" id="paidUsersCount">0</p>
                </div>
                <div class="w-12 h-12 rounded-full bg-green-50 text-green-600 flex items-center justify-center text-xl">
                    <i class="fas fa-crown"></i>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-slate-500">Unpaid Users</p>
                    <p class="text-3xl font-bold text-slate-700" id="unpaidUsersCount">0</p>
                </div>
                <div class="w-12 h-12 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-xl">
                    <i class="fas fa-user-clock"></i>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-t-2xl shadow-sm border border-slate-100 border-b-0 flex flex-col sm:flex-row justify-between items-center gap-4 mt-6">
            <h2 class="text-lg font-bold text-slate-800">User Directory</h2>
            <div class="relative w-full sm:w-96">
                <i class="fas fa-search absolute left-4 top-3 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Search by name or email..." 
                    class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm">
            </div>
        </div>

        <div class="bg-white shadow-sm border border-slate-100 overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase text-slate-500 font-semibold">
                        <th class="px-6 py-4">User</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>

        <div class="bg-white p-4 rounded-b-2xl shadow-sm border border-slate-100 border-t-0 flex justify-between items-center text-sm">
            <p class="text-slate-500" id="paginationInfo">Showing 1 to 5 of 0 entries</p>
            <div class="flex space-x-2">
                <button id="prevBtn" class="px-4 py-2 border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">Previous</button>
                <button id="nextBtn" class="px-4 py-2 border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">Next</button>
            </div>
        </div>

    </div>

    <script>
        // 🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩
        // 🟢 FIREBASE SETUP AREA 🟢
        // 🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩
        
        /* 🟢 IMPORT FIREBASE HERE 🟢
           import { initializeApp } from "firebase/app";
           import { getFirestore, collection, getDocs, doc, updateDoc } from "firebase/firestore";
        */

        // Simulated Data (Replace this array with your Firebase fetch logic)
        let usersData = [
            { id: "1", name: "Mubarik Osman", email: "mubarik@hiigsitech.com", paid: true, avatar: "MO" },
            { id: "2", name: "Ahmed Ali", email: "ahmed@example.com", paid: false, avatar: "AA" },
            { id: "3", name: "Sarah Jama", email: "sarah@example.com", paid: true, avatar: "SJ" },
            { id: "4", name: "Omar Hassan", email: "omar@example.com", paid: false, avatar: "OH" },
            { id: "5", name: "Fatima Noor", email: "fatima@example.com", paid: true, avatar: "FN" },
            { id: "6", name: "Hassan Abdi", email: "hassan@example.com", paid: false, avatar: "HA" },
            { id: "7", name: "Layla Hussein", email: "layla@example.com", paid: false, avatar: "LH" }
        ];

        // App State
        let currentPage = 1;
        const itemsPerPage = 5;
        let searchQuery = "";

        // ==========================================
        // 🟢 FIREBASE API FUNCTIONS 🟢
        // ==========================================

        async function fetchUsersFromFirebase() {
            // 🟢 REPLACE WITH REAL FIREBASE GET CALL 🟢
            // const querySnapshot = await getDocs(collection(db, "users"));
            // let loadedUsers = [];
            // querySnapshot.forEach((doc) => loadedUsers.push({ id: doc.id, ...doc.data() }));
            // usersData = loadedUsers;
            
            console.log("🟢 Loaded users from database.");
            renderDashboard();
        }

        async function toggleUserStatusInFirebase(userId, currentStatus) {
            const newStatus = !currentStatus;
            
            // 🟢 REPLACE WITH REAL FIREBASE UPDATE CALL 🟢
            // const userRef = doc(db, "users", userId);
            // await updateDoc(userRef, { paid: newStatus });
            
            // Local fallback simulation:
            const userIndex = usersData.findIndex(u => u.id === userId);
            if(userIndex > -1) {
                usersData[userIndex].paid = newStatus;
                console.log(`🟢 Updated user ${userId} to Paid: ${newStatus} in database.`);
                renderDashboard();
            }
        }

        // ==========================================
        // UI AND LOGIC FUNCTIONS
        // ==========================================

        function renderDashboard() {
            // 1. Filter by Search
            const filteredUsers = usersData.filter(user => 
                user.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                user.email.toLowerCase().includes(searchQuery.toLowerCase())
            );

            // 2. Update Metrics
            const total = filteredUsers.length;
            const paid = filteredUsers.filter(u => u.paid).length;
            const unpaid = total - paid;

            document.getElementById('totalUsersCount').innerText = total;
            document.getElementById('paidUsersCount').innerText = paid;
            document.getElementById('unpaidUsersCount').innerText = unpaid;

            // 3. Handle Pagination
            const totalPages = Math.ceil(total / itemsPerPage);
            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedUsers = filteredUsers.slice(startIndex, startIndex + itemsPerPage);

            // Update Pagination UI
            const endCount = Math.min(startIndex + itemsPerPage, total);
            document.getElementById('paginationInfo').innerText = 
                total === 0 ? "No records found" : `Showing ${startIndex + 1} to ${endCount} of ${total} users`;

            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages || total === 0;

            // 4. Render Table Rows
            const tableBody = document.getElementById('userTableBody');
            tableBody.innerHTML = '';

            paginatedUsers.forEach(user => {
                const statusBadge = user.paid 
                    ? `<span class="bg-green-100 text-green-700 border border-green-200 px-3 py-1 rounded-full text-xs font-bold flex items-center inline-flex w-fit"><i class="fas fa-check-circle mr-1"></i> PRO</span>`
                    : `<span class="bg-slate-100 text-slate-500 border border-slate-200 px-3 py-1 rounded-full text-xs font-bold flex items-center inline-flex w-fit"><i class="fas fa-lock mr-1"></i> FREE</span>`;

                const actionButton = user.paid
                    ? `<button onclick="toggleUserStatusInFirebase('${user.id}', true)" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg text-sm font-semibold transition-colors duration-200">Revoke Pro</button>`
                    : `<button onclick="toggleUserStatusInFirebase('${user.id}', false)" class="text-green-600 hover:text-green-800 bg-green-50 hover:bg-green-100 px-4 py-2 rounded-lg text-sm font-semibold transition-colors duration-200">Grant Pro</button>`;

                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 text-white flex items-center justify-center font-bold text-sm shadow-sm">
                                    ${user.avatar}
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-bold text-slate-900">${user.name}</div>
                                    <div class="text-sm text-slate-500">${user.email}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            ${statusBadge}
                        </td>
                        <td class="px-6 py-4 text-right">
                            ${actionButton}
                        </td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            currentPage = 1; // Reset to page 1 on search
            renderDashboard();
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderDashboard();
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentPage++;
            renderDashboard();
        });

        // Initialize App
        fetchUsersFromFirebase();

    </script>
</body>
</html>
